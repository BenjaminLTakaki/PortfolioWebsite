<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benjamin Takaki Portfolio</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #080a0d;
            --ink: #e7e1d4;
            --muted: #8a918a;
            --acid: #d7ff3f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, Arial, sans-serif;
        }

        main {
            width: min(680px, calc(100vw - 2rem));
            border: 1px solid rgba(231, 225, 212, 0.22);
            padding: 2rem;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.5rem, 9vw, 6rem);
            line-height: 0.84;
            text-transform: uppercase;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
        }

        a {
            color: var(--acid);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>Benjamin Takaki</h1>
        <p>The redesigned portfolio is now a Next.js app. During local development, open <a href="http://localhost:3001">http://localhost:3001</a>.</p>
    </main>
</body>
</html>
